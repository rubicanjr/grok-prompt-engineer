name: Daily Orchestrator Run

on:
  workflow_dispatch:   # Manuel tetikleme + GitHub UI’dan çalıştırılabilir
  # schedule kaldırıldı (ci.yml ile çakışmasın)

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Orchestrator
        run: |
          PYTHONPATH=src python src/orchestrator.py || python artifacts/orchestrator.py
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orchestrator-logs
          path: |
            artifacts/logs/
            artifacts/Usage_Log.md
            artifacts/alerts.log
