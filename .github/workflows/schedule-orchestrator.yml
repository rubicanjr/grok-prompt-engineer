name: Daily Orchestrator + Monitoring Run

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-orchestrator-and-monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Orchestrator
        run: |
          PYTHONPATH=src python src/orchestrator.py

      - name: Run Monitoring and Health Check
        run: |
          PYTHONPATH=src python src/monitor_and_alert.py

      - name: Upload logs and monitoring results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: daily-orchestrator-monitoring-logs
          path: |
            artifacts/logs/
            artifacts/alerts.log
            artifacts/Usage_Log.md
            artifacts/state.json