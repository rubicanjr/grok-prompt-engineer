name: Grok Prompt Engineer CI/CD

on:
  push:
    branches: [ main, production-ready ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short --cov=src --cov-report=xml

      - name: Run Execution Engine
        run: |
          PYTHONPATH=src python src/execution_engine.py --auto

      - name: Run Monitoring
        run: |
          PYTHONPATH=src python src/monitor_and_alert.py

      - name: Upload logs and coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs
          path: |
            artifacts/logs/
            artifacts/alerts.log
            coverage.xml