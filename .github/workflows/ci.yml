# === ci.yml ===
name: Grok Prompt Engineer CI/CD

on:
  push:
    branches: [ main, production-ready ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short --cov=src --cov-report=xml

      - name: Run Execution Engine (dry-run)
        run: |
          PYTHONPATH=src python -m src.execution_engine --auto || echo "Execution Engine çalıştırılamadı (göz ardı edildi)"

      - name: Upload test results and coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage.xml
            artifacts/logs/
            artifacts/alerts.log