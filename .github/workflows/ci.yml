name: Grok Prompt Engineer CI/CD

on:
  push:
    branches: [ main, production-ready ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff black

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

      - name: Lint with Ruff
        run: |
          ruff check src/ tests/

      - name: Format check with Black
        run: |
          black --check src/ tests/

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-fail-under=80

      - name: Run Execution Engine (dry-run)
        run: |
          PYTHONPATH=src python src/execution_engine.py --auto || echo "Execution Engine skipped"

      - name: Upload test results and coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            coverage.xml
            artifacts/logs/
            artifacts/alerts.log